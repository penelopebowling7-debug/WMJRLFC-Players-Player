<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>U11 Player Votes</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    h1, h2 { margin-bottom: 8px; }
    button { padding: 12px 16px; font-size: 16px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; }
    .player-row { margin-bottom: 8px; }
    .player-button { width: 100%; text-align: left; }
    .tag { font-size: 12px; margin-left: 8px; }
    .voted { color: green; }
    .not-voted { color: red; }

    /* Overlays */
    #voteOverlay, #coachOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 20px;
    }
    #voteBox, #coachBox {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      max-width: 500px;
      width: 100%;
    }
    .vote-option {
      width: 100%;
      margin: 4px 0;
      padding: 10px 14px;
      font-size: 16px;
    }
    #closeOverlayBtn {
      margin-top: 8px;
      background: #ccc;
    }
    #coachResults { white-space: pre-wrap; font-size: 14px; }
  </style>
</head>

<body>

  <div class="top-bar">
    <h1>U11 Player Votes</h1>
    <button onclick="openCoachPIN()">Coach</button>
  </div>

  <div>
    <label>Round:
      <input type="number" id="roundInput" value="1" min="1">
    </label>
    <button onclick="changeRound()">Set Round</button>
    <button onclick="newRound()">New Round</button>
  </div>

  <h2 id="roundTitle"></h2>

  <div id="playerList"></div>

  <!-- Voting overlay -->
  <div id="voteOverlay">
    <div id="voteBox">
      <h2 id="voteTitle"></h2>
      <div id="voteOptions"></div>
      <button id="closeOverlayBtn" onclick="closeVoteOverlay()">Cancel</button>
    </div>
  </div>

  <!-- Coach overlay -->
  <div id="coachOverlay">
    <div id="coachBox">
      <h2>Coach Results</h2>
      <div id="coachResults"></div>

      <button onclick="resetSeason()" style="background:#d9534f; color:white; margin-top:10px;">
        Reset Season
      </button>

      <button onclick="closeCoachOverlay()" style="margin-top:10px;">
        Close
      </button>
    </div>
  </div>

  <script>
    const PIN = "2287";

    const players = [
      { id: 1, name: 'Aaleyah Thoroughgood' },
      { id: 2, name: 'Archie Hickson' },
      { id: 3, name: 'Archie Nean' },
      { id: 4, name: 'Ari Finlay' },
      { id: 5, name: 'Axton Thomas' },
      { id: 6, name: 'Axel Velasquez Williamson' },
      { id: 7, name: 'Boaz Bowman' },
      { id: 8, name: 'Cash Walters' },
      { id: 9, name: 'Chayce Cumpson' },
      { id: 10, name: 'Don Moodie' },
      { id: 11, name: 'Ethan Sadowski' },
      { id: 12, name: 'Max Croak' },
      { id: 13, name: 'Taj Lennard' },
      { id: 14, name: 'Tanner Paton' },
      { id: 15, name: 'William Hand' },
      { id: 16, name: 'Zayden Clifford' }
    ];

    let currentRound = 1;
    let votes = [];
    let currentVoterId = null;

    function init() {
      loadState();
      render();
    }

    function loadState() {
      const saved = localStorage.getItem('u11Votes');
      if (saved) {
        const data = JSON.parse(saved);
        currentRound = data.currentRound || 1;
        votes = data.votes || [];
        document.getElementById('roundInput').value = currentRound;
      }
    }

    function saveState() {
      localStorage.setItem('u11Votes', JSON.stringify({
        currentRound,
        votes
      }));
    }

    function changeRound() {
      const val = parseInt(document.getElementById('roundInput').value, 10);
      if (val >= 1) {
        currentRound = val;
        saveState();
        render();
      }
    }

    function newRound() {
      const val = parseInt(prompt('Start new round number:', currentRound + 1), 10);
      if (!isNaN(val) && val >= 1) {
        currentRound = val;
        document.getElementById('roundInput').value = currentRound;
        saveState();
        render();
      }
    }

    function hasVoted(playerId) {
      return votes.some(v => v.round === currentRound && v.voterId === playerId);
    }

    function recordVote(voterId, votedForId) {
      if (voterId === votedForId) {
        alert('You cannot vote for yourself.');
        return;
      }
      if (hasVoted(voterId)) {
        alert('This player has already voted this round.');
        return;
      }
      votes.push({
        round: currentRound,
        voterId,
        votedForId,
        timestamp: Date.now()
      });
      saveState();
      closeVoteOverlay();
      render();
    }

    function openVoteOverlay(voterId) {
      if (hasVoted(voterId)) {
        alert('This player has already voted this round.');
        return;
      }
      currentVoterId = voterId;
      const voter = players.find(p => p.id === voterId);
      document.getElementById('voteTitle').textContent =
        `Who is ${voter.name} voting for?`;

      const optionsDiv = document.getElementById('voteOptions');
      optionsDiv.innerHTML = '';

      players
        .filter(p => p.id !== voterId)
        .forEach(p => {
          const btn = document.createElement('button');
          btn.className = 'vote-option';
          btn.textContent = p.name;
          btn.onclick = () => recordVote(voterId, p.id);
          optionsDiv.appendChild(btn);
        });

      document.getElementById('voteOverlay').style.display = 'flex';
    }

    function closeVoteOverlay() {
      document.getElementById('voteOverlay').style.display = 'none';
      currentVoterId = null;
    }

    function openCoachPIN() {
      const entered = prompt("Enter PIN:");
      if (entered === PIN) {
        openCoachOverlay();
      } else if (entered !== null) {
        alert("Incorrect PIN");
      }
    }

    function openCoachOverlay() {
      const resultsDiv = document.getElementById('coachResults');
      resultsDiv.textContent = generateCoachReport();
      document.getElementById('coachOverlay').style.display = 'flex';
    }

    function closeCoachOverlay() {
      document.getElementById('coachOverlay').style.display = 'none';
    }

    function resetSeason() {
      if (!confirm("Are you sure you want to reset ALL rounds and votes?")) return;

      votes = [];
      currentRound = 1;
      document.getElementById('roundInput').value = 1;

      saveState();
      render();
      closeCoachOverlay();

      alert("Season has been reset.");
    }

    function generateCoachReport() {
      let text = "";

      text += `=== CURRENT ROUND (${currentRound}) TALLY ===\n`;
      const roundVotes = votes.filter(v => v.round === currentRound);
      const counts = {};
      roundVotes.forEach(v => {
        counts[v.votedForId] = (counts[v.votedForId] || 0) + 1;
      });

      players.forEach(p => {
        text += `${p.name}: ${counts[p.id] || 0}\n`;
      });

      text += `\n=== FULL VOTE LIST (ROUND ${currentRound}) ===\n`;
      roundVotes.forEach(v => {
        const voter = players.find(p => p.id === v.voterId).name;
        const votedFor = players.find(p => p.id === v.votedForId).name;
        text += `${voter} → ${votedFor}\n`;
      });

      text += `\n=== ROUND HISTORY ===\n`;
      const rounds = [...new Set(votes.map(v => v.round))].sort((a,b)=>a-b);
      rounds.forEach(r => {
        text += `\nRound ${r}:\n`;
        const rv = votes.filter(v => v.round === r);
        const c = {};
        rv.forEach(v => c[v.votedForId] = (c[v.votedForId] || 0) + 1);
        players.forEach(p => {
          text += `  ${p.name}: ${c[p.id] || 0}\n`;
        });
      });

      return text;
    }

    function render() {
      document.getElementById('roundTitle').textContent = `Round ${currentRound}`;

      const listDiv = document.getElementById('playerList');
      listDiv.innerHTML = '';
      players.forEach(p => {
        const row = document.createElement('div');
        row.className = 'player-row';

        const btn = document.createElement('button');
        btn.className = 'player-button';
        btn.textContent = p.name;
        btn.onclick = () => openVoteOverlay(p.id);

        const tag = document.createElement('span');
        tag.className = 'tag ' + (hasVoted(p.id) ? 'voted' : 'not-voted');
        tag.textContent = hasVoted(p.id) ? 'Voted' : 'Not voted';

        row.appendChild(btn);
        row.appendChild(tag);
        listDiv.appendChild(row);
      });
    }

    init();
  </script>

</body>
</html>
