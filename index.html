<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WMJRLFC Voting</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
    margin: 0;
    padding: 0;
}

header {
    background-color: #000;
    text-align: center;
    padding: 15px;
}

header img {
    height: 80px;
}

button {
    background-color: orange;
    color: black;
    border: none;
    padding: 10px 16px;
    margin: 5px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

.container {
    padding: 20px;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 15px;
}

th, td {
    border: 1px solid #444;
    padding: 8px;
    text-align: left;
}

th {
    background-color: orange;
    color: black;
}

.leader {
    background-color: #2e7d32;
    color: white;
}

.team-header {
    background-color: #222;
    font-weight: bold;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<header>
    <img src="WMJRLFC-logo.jpg" alt="Club Logo">
    <h2>WMJRLFC Team Voting</h2>
</header>

<div class="container">

<h3>Admin Panel</h3>

<button onclick="showSelectedTeamTallies()">Show Selected Team Tallies</button>
<button onclick="showAllTeamTallies()">Show All Team Tallies</button>
<button onclick="exportCSV()">Export CSV</button>

<br><br>

<label>
<input type="radio" name="focus" value="round" checked>
Round
</label>

<label>
<input type="radio" name="focus" value="season">
Season
</label>

<label>
<input type="radio" name="focus" value="both">
Both
</label>

<br><br>

<button onclick="expandAll()">Expand All</button>
<button onclick="collapseAll()">Collapse All</button>

<table id="tallyTable">
<thead>
<tr>
<th>Team</th>
<th>Player</th>
<th>Round Votes</th>
<th>Season Votes</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

</div>

<script>

let exampleData = {
    "Team A": [
        { name: "Player 1", round: 3, season: 12 },
        { name: "Player 2", round: 1, season: 9 },
        { name: "Player 3", round: 0, season: 5 }
    ],
    "Team B": [
        { name: "Player 4", round: 2, season: 8 },
        { name: "Player 5", round: 0, season: 6 }
    ]
};

function getFocus() {
    return document.querySelector('input[name="focus"]:checked').value;
}

function clearTable() {
    document.querySelector("#tallyTable tbody").innerHTML = "";
}

function toggleTeam(team) {
    let rows = document.querySelectorAll("[data-team='" + team + "']");
    rows.forEach(r => {
        r.classList.toggle("hidden");
    });
}

function expandAll() {
    document.querySelectorAll("tbody tr").forEach(r => {
        r.classList.remove("hidden");
    });
}

function collapseAll() {
    document.querySelectorAll("tbody tr.player-row").forEach(r => {
        r.classList.add("hidden");
    });
}

function highlightLeaders(players, focus) {

    let max = 0;

    players.forEach(p => {
        let value =
            focus === "round" ? p.round :
            focus === "season" ? p.season :
            p.season;

        if (value > max) max = value;
    });

    return max;
}

function renderTeams(data) {

    clearTable();

    let tbody = document.querySelector("#tallyTable tbody");
    let focus = getFocus();

    Object.keys(data).forEach(team => {

        let header = document.createElement("tr");
        header.className = "team-header";
        header.innerHTML =
            "<td colspan='4'>" + team + "</td>";

        header.onclick = () => toggleTeam(team);

        tbody.appendChild(header);

        let leader = highlightLeaders(data[team], focus);

        data[team].forEach(player => {

            let tr = document.createElement("tr");
            tr.className = "player-row";
            tr.setAttribute("data-team", team);

            let highlight =
                (focus === "round" && player.round === leader) ||
                (focus !== "round" && player.season === leader);

            if (highlight) tr.classList.add("leader");

            tr.innerHTML =
                "<td>" + team + "</td>" +
                "<td>" + player.name + "</td>" +
                "<td>" + player.round + "</td>" +
                "<td>" + player.season + "</td>";

            tbody.appendChild(tr);
        });

    });
}

function showSelectedTeamTallies() {

    let selected = {
        "Team A": exampleData["Team A"]
    };

    renderTeams(selected);
}

function showAllTeamTallies() {
    renderTeams(exampleData);
}

function exportCSV() {

    let rows = document.querySelectorAll("#tallyTable tr");
    let csv = [];

    rows.forEach(row => {
        let cols = row.querySelectorAll("td, th");
        let data = [];

        cols.forEach(col => {
            data.push(col.innerText);
        });

        csv.push(data.join(","));
    });

    let blob = new Blob([csv.join("\n")]);
    let url = window.URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "team_tallies.csv";
    a.click();
}

</script>

</body>
</html>
